services:
  openclaw-gateway:
    build: .
    container_name: openclaw-gateway
    hostname: openclaw-gateway
    restart: unless-stopped
    
    # Tailscale 需要的权限
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    
    # 端口映射
    ports:
      - "18789:18789"
      - "18790:18790"
    
    # 环境变量
    environment:
      # Tailscale
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:-}
      
      # AI Provider 配置
      - PROVIDER_NAME=${PROVIDER_NAME:-custom-openai}
      - BASE_URL=${BASE_URL:-}
      - API_KEY=${API_KEY:-}
      - API_PROTOCOL=${API_PROTOCOL:-openai-completions}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      
      # 飞书
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      
      # 钉钉
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID:-}
      - DINGTALK_CLIENT_SECRET=${DINGTALK_CLIENT_SECRET:-}
      - DINGTALK_ROBOT_CODE=${DINGTALK_ROBOT_CODE:-}
      - DINGTALK_AGENT_ID=${DINGTALK_AGENT_ID:-}
      
      # QQ 机器人
      - QQBOT_APP_ID=${QQBOT_APP_ID:-}
      - QQBOT_CLIENT_SECRET=${QQBOT_CLIENT_SECRET:-}
      
      # 企业微信
      - WECOM_TOKEN=${WECOM_TOKEN:-}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY:-}
      
      # 搜索 API
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    
    # 从 .env 文件加载环境变量
    env_file:
      - .env
    
    # 数据持久化
    volumes:
      - ./data/openclaw:/root/.openclaw
      - ./data/tailscale:/var/lib/tailscale
      - ./data/secure:/root/.secure
      # sing-box 配置文件（可选，存在则启动服务）
      - ./data/secure/sing-box:/etc/sing-box:ro
      # 挂载启动脚本（支持热更新）
      - ./scripts/start.sh:/usr/local/bin/openclaw-start.sh:ro
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "openclaw --version || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
